channel: v2_status
updated: "2026-05-01"
defaults:
  no_reply_default: WAIT
  irreversible_requires_explicit_approve: true
  max_body_chars: 800

cards:
  daily_status:
    title: "V2 Status — Week {week} Day {day}"
    cadence: "daily 08:00"
    body: "{done}/{total} gate criteria done. Blocker: {blocker}. Substack streak: {substack_streak}. Cost: {cost}."
    reply_options: []
  decision:
    title: "{decision_title}"
    cadence: "on demand"
    body: "{recommendation}\nReply: GO / WAIT / ABORT. Default in 24h: WAIT."
    reply_options: ["GO", "WAIT", "ABORT"]
  sunday_gate:
    title: "Sunday Gate Review — Week {week}"
    cadence: "weekly Sunday 09:00"
    body: "Gate result: {result}. Mira recommends: {recommendation}.\nReply: APPROVE / CHANGE-TO-CATCHUP / CHANGE-TO-DESCOPE / CHANGE-TO-ABORT."
    reply_options: ["APPROVE", "CHANGE-TO-CATCHUP", "CHANGE-TO-DESCOPE", "CHANGE-TO-ABORT"]
  drift_alert:
    title: "V2 Drift Alert"
    cadence: "on demand"
    body: "{alert}\nReply: ADR-INCOMING / OVERRIDE / RETIRE-PR."
    reply_options: ["ADR-INCOMING", "OVERRIDE", "RETIRE-PR"]
  build_summary:
    title: "Build Session Summary — {date}"
    cadence: "after Claude Code session"
    body: "{summary}\nDecision needed: {decision_needed}"
    reply_options: ["ACCEPT", "WAIT"]
