<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mira</title>
<style>
  :root {
    /* Mira palette — mirrors iOS app exactly */
    --bg: #1A1A22; --sidebar-bg: #14141B; --card: #26262F; --card-hover: #32323D;
    --text: #F2F2EE; --text2: #A0A0AC; --text3: #6E6E7A;
    --accent: #8FE5B8; --accent2: #2C4438; --badge: #FFCB6E;
    --orange: #FFA85C; --red: #FF9081; --blue: #7FC4F0;
    --bubble-out: #2C4438; --bubble-in: #26262F;
    --border: #3A3A46; --radius: 8px;

    /* Category colors (bright pastel family — same as iOS) */
    --c-health: #FF9081;     /* coral */
    --c-alert:  #FFA85C;     /* sunset */
    --c-social: #7FC4F0;     /* sky */
    --c-writing:#8FE5B8;     /* mint */
    --c-analysis:#FFCB6E;    /* honey */
    --c-journal:#C7A8F0;     /* lilac */
    --c-explore:#7DD8E0;     /* cyan */
    --c-podcast:#FF9DBE;     /* rose */
    --c-photo:  #FFB088;     /* peach */
    --c-code:   #A8B8FF;     /* periwinkle */
    --c-agent:  #F0D9A8;     /* cream */
    --c-request:#A0C8F0;     /* slate */
    --c-discuss:#D4A0F0;     /* orchid */
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  .mono { font-family: 'SF Mono', Menlo, 'Roboto Mono', ui-monospace, monospace; }

  /* ===== Profile Picker ===== */
  .profiles { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:24px; background: var(--sidebar-bg); }
  .profiles h2 { color: var(--text2); font-size:20px; }
  .profile-btn { display:flex; align-items:center; gap:14px; padding:14px 20px; background:var(--card); border:none; border-radius:var(--radius); cursor:pointer; width:280px; color:var(--text); font-size:17px; transition: background .15s; }
  .profile-btn:hover { background:var(--card-hover); }
  .profile-btn .avatar { width:40px; height:40px; border-radius:50%; background:var(--accent2); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .profile-btn .name { font-weight:600; }
  .profile-btn .agent { font-size:13px; color:var(--text2); }

  /* ===== Three-Column Layout ===== */
  .layout { display:grid; grid-template-columns: 240px 1fr 1fr; height:100vh; }
  @media (max-width: 1000px) { .layout { grid-template-columns: 200px 1fr; } .detail-panel { display:none !important; } }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .sidebar { display:none !important; } .detail-panel { display:none !important; } }

  /* Sidebar */
  .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
  .sidebar-header { padding:18px 16px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size:14px; font-weight:500; letter-spacing:.3px; text-transform:lowercase; }
  .sidebar-header .status { display:flex; align-items:center; gap:6px; }
  .dot { width:6px; height:6px; border-radius:50%; }
  .dot.online { background:var(--accent); }
  .dot.offline { background:var(--red); }
  .sidebar-nav { padding:8px 6px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:14px; color:var(--text2); transition: background .1s; letter-spacing:.2px; }
  .nav-item:hover { background:var(--card); color:var(--text); }
  .nav-item.active { background:var(--card); color:var(--text); }
  .nav-item .badge { margin-left:auto; background:var(--orange); color:var(--bg); font-size:11px; font-weight:600; padding:1px 6px; border-radius:8px; font-family:'SF Mono',Menlo,monospace; }
  .nav-sep { height:1px; background:var(--border); margin:8px 12px; }
  .sidebar-footer { margin-top:auto; padding:12px; border-top:1px solid var(--border); }
  .sidebar-footer button { width:100%; padding:8px; background:none; border:1px solid var(--border); border-radius:8px; color:var(--text2); cursor:pointer; font-size:12px; font-family:'SF Mono',Menlo,monospace; letter-spacing:.5px; }
  .sidebar-footer button:hover { background:var(--card); color:var(--text); }

  /* Middle panel — list */
  .list-panel { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .list-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .list-header h2 { font-size:14px; font-weight:500; flex:1; text-transform:lowercase; letter-spacing:.3px; }
  .search-box { width:100%; padding:9px 14px; border-radius:8px; border:none; background:var(--card); color:var(--text); font-size:13px; outline:none; }
  .search-box::placeholder { color:var(--text3); }
  .list-content { flex:1; overflow-y:auto; }
  .section-label { padding:14px 18px 10px; font-size:11px; font-weight:400; color:var(--text3); letter-spacing:1.2px; display:flex; align-items:center; gap:8px; font-family:'SF Mono',Menlo,monospace; }
  .section-label .cnt { color:var(--text3); font-size:11px; padding:0; background:none; }
  .section-label.warn .cnt { color:var(--orange); }

  /* Row — solid pastel avatar + tinted bg + tag chip */
  .row { display:flex; align-items:flex-start; gap:14px; padding:13px 18px; cursor:pointer; transition:background .1s; position:relative; }
  .row:hover { filter: brightness(1.08); }
  .row + .row { border-top: .5px solid var(--border); }
  .row.selected { box-shadow: inset 3px 0 0 var(--accent); }
  .row-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; color:var(--bg); font-weight:500; }
  .row-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }
  .row-tag { font-size:11px; letter-spacing:.8px; font-family:'SF Mono',Menlo,monospace; }
  .row-title { font-size:15px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text2); }
  .row-title.unread { font-weight:600; color:var(--text); }
  .row-sub { font-size:13px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row-meta { text-align:right; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .row-time { font-size:11px; color:var(--text3); font-family:'SF Mono',Menlo,monospace; }
  .row-badge { display:inline-block; font-size:10px; color:var(--orange); font-family:'SF Mono',Menlo,monospace; letter-spacing:.5px; }
  .row-pin { font-size:10px; color:var(--text3); }
  .tags { display:flex; gap:4px; margin-top:2px; }
  .tag { font-size:10px; padding:1px 6px; background:var(--card); color:var(--text2); border-radius:4px; font-family:'SF Mono',Menlo,monospace; letter-spacing:.4px; }

  .new-input { display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--border); }
  .new-input input { flex:1; padding:9px 14px; border-radius:8px; border:none; background:var(--card); color:var(--text); font-size:14px; outline:none; }
  .new-input button { background:var(--accent); color:var(--bg); border:none; border-radius:8px; width:36px; height:36px; cursor:pointer; font-size:15px; font-weight:600; }

  /* Right panel — detail / artifact */
  .detail-panel { display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
  .detail-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .detail-header h3 { font-size:14px; font-weight:500; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:.2px; }
  .detail-header button { background:none; border:none; color:var(--text2); cursor:pointer; font-size:14px; padding:4px 6px; }
  .detail-header button:hover { color:var(--text); }
  .messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; background:var(--sidebar-bg); }
  .msg { max-width:80%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.55; white-space:pre-wrap; word-wrap:break-word; }
  .msg a { color:var(--blue); text-decoration:underline; }
  .msg.user { align-self:flex-end; background:var(--bubble-out); }
  .msg.agent { align-self:flex-start; background:var(--bubble-in); }
  .msg.error { align-self:stretch; background:rgba(255,144,129,.12); color:var(--red); font-size:13px; padding:10px 14px; border-radius:10px; }
  .msg.status_card { align-self:center; color:var(--text3); font-size:11px; background:none; padding:4px 0; font-family:'SF Mono',Menlo,monospace; letter-spacing:.5px; }
  .msg-time { font-size:10px; color:var(--text3); margin-top:6px; font-family:'SF Mono',Menlo,monospace; }
  .reply-bar { display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--border); background:var(--bg); }
  .reply-bar input { flex:1; padding:9px 14px; border-radius:8px; border:none; background:var(--card); color:var(--text); font-size:14px; outline:none; }
  .reply-bar button { background:var(--accent); color:var(--bg); border:none; border-radius:8px; width:36px; height:36px; cursor:pointer; font-weight:600; }
  .reply-bar button:disabled { background:var(--card); color:var(--text3); cursor:not-allowed; }

  /* Artifact viewer */
  .artifact-content { flex:1; overflow-y:auto; padding:24px; font-size:14px; line-height:1.7; white-space:pre-wrap; color:var(--text); }
  .artifact-list { list-style:none; }
  .artifact-list li { padding:12px 18px; border-bottom: .5px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:12px; font-size:14px; color:var(--text); }
  .artifact-list li:hover { background:var(--card); }
  .artifact-list .size { color:var(--text3); font-size:11px; margin-left:auto; font-family:'SF Mono',Menlo,monospace; }

  .operator-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; padding:16px; }
  .operator-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .operator-card h4 { font-size:13px; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:8px; }
  .operator-value { font-size:28px; font-weight:700; }
  .operator-note { font-size:13px; color:var(--text2); margin-top:4px; }
  .operator-section { padding:10px 16px 0; }
  .operator-section h4 { font-size:12px; text-transform:uppercase; color:var(--text3); letter-spacing:.5px; margin-bottom:8px; }
  .operator-list { display:flex; flex-direction:column; gap:8px; }
  .operator-row { padding:10px 12px; border-radius:10px; background:var(--card); border:1px solid var(--border); }
  .operator-row-title { font-size:14px; font-weight:600; }
  .operator-row-sub { font-size:12px; color:var(--text2); margin-top:3px; white-space:pre-wrap; word-break:break-word; }

  .empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:13px; font-family:'SF Mono',Menlo,monospace; letter-spacing:.5px; }
  .operator-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .operator-card h4 { font-size:11px; color:var(--text3); letter-spacing:1.2px; margin-bottom:8px; font-family:'SF Mono',Menlo,monospace; }
  .operator-value { font-size:24px; font-weight:300; }
  .operator-note { font-size:11px; color:var(--text3); margin-top:4px; font-family:'SF Mono',Menlo,monospace; }
  .operator-section { padding:14px 16px 0; }
  .operator-section h4 { font-size:11px; color:var(--text3); letter-spacing:1.2px; margin-bottom:10px; font-family:'SF Mono',Menlo,monospace; }
  .operator-row { padding:11px 14px; border-radius:8px; background:var(--card); margin-bottom:6px; }
  .operator-row-title { font-size:13px; font-weight:500; }
  .operator-row-sub { font-size:11px; color:var(--text2); margin-top:3px; white-space:pre-wrap; word-break:break-word; font-family:'SF Mono',Menlo,monospace; }
</style>
</head>
<body>

<!-- Profile Picker -->
<div class="profiles" id="profilePicker">
  <div style="font-size:44px">💬</div>
  <h2>Mira</h2>
  <div id="profileList"></div>
</div>

<!-- Main Layout -->
<div class="layout" id="mainLayout" style="display:none">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div>
        <h1 id="userName"></h1>
        <div class="status"><div class="dot" id="statusDot"></div><span id="statusText" style="font-size:13px"></span></div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">
      <button onclick="switchProfile()">Switch Profile</button>
    </div>
  </div>

  <!-- List Panel -->
  <div class="list-panel">
    <div class="list-header">
      <h2 id="listTitle">Home</h2>
    </div>
    <div style="padding:6px 16px"><input class="search-box" placeholder="Search..." id="searchInput" oninput="renderList()"></div>
    <div class="list-content" id="listContent"></div>
    <div class="new-input">
      <input placeholder="New request..." id="newInput" onkeydown="if(event.key==='Enter'&&!event.isComposing)sendNew()">
      <button onclick="sendNew()">↑</button>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailTitle">Select an item</h3>
      <button onclick="pinCurrent()" title="Pin">📌</button>
      <button onclick="shareCurrent()" title="Share">↗️</button>
      <button onclick="archiveCurrent()" title="Archive">🗃️</button>
    </div>
    <div class="messages" id="detailMessages">
      <div class="empty">Select a conversation to view</div>
    </div>
    <div class="reply-bar" id="replyBar" style="display:none">
      <input placeholder="Reply..." id="replyInput" onkeydown="if(event.key==='Enter'&&!event.isComposing)sendReply()">
      <button onclick="sendReply()">↑</button>
    </div>
  </div>
</div>

<script>
let currentUser = null, currentTab = 'home', currentItemId = null, items = [], currentSection = null, pollTimer = null;
let webToken = localStorage.getItem('mira_web_token') || '';
let operatorSummary = null;

function authHeaders(extra) {
  const headers = {...(extra || {})};
  if (webToken) headers['X-Mira-Token'] = webToken;
  return headers;
}

function tokenizedUrl(url) {
  if (!webToken) return url;
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}token=${encodeURIComponent(webToken)}`;
}

function promptForToken(force) {
  if (webToken && !force) return true;
  const value = window.prompt('Mira Web token', webToken || '');
  if (value === null) return false;
  webToken = value.trim();
  if (webToken) localStorage.setItem('mira_web_token', webToken);
  else localStorage.removeItem('mira_web_token');
  return !!webToken;
}

async function apiFetch(url, options) {
  const opts = {...(options || {})};
  opts.headers = authHeaders(opts.headers);
  let res = await fetch(url, opts);
  if ((res.status === 401 || res.status === 403) && promptForToken(true)) {
    opts.headers = authHeaders((options || {}).headers);
    res = await fetch(url, opts);
  }
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

// ===== Profiles =====
async function loadProfiles() {
  const res = await apiFetch('/api/profiles');
  const data = await res.json();
  document.getElementById('profileList').innerHTML = data.profiles.map(p => `
    <button class="profile-btn" onclick="selectProfile('${p.id}','${p.display_name}')">
      <div class="avatar">👤</div>
      <div><div class="name">${p.display_name}</div><div class="agent">Agent: ${p.agent_name}</div></div>
    </button>`).join('');
}
function selectProfile(id, name) {
  currentUser = id;
  document.getElementById('profilePicker').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'grid';
  document.getElementById('userName').textContent = name;
  localStorage.setItem('mira_profile', id);
  localStorage.setItem('mira_name', name);
  buildSidebar();
  refresh();
  pollTimer = setInterval(refresh, 15000);
  startSSE(id);
}
function switchProfile() {
  clearInterval(pollTimer);
  if (eventSource) { eventSource.close(); eventSource = null; }
  currentUser = null; currentItemId = null;
  localStorage.removeItem('mira_profile');
  document.getElementById('profilePicker').style.display = 'flex';
  document.getElementById('mainLayout').style.display = 'none';
}

// ===== Sidebar =====
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  // Lowercase labels + monospaced badge — matches iOS toolbar style
  nav.innerHTML = `
    <div class="nav-item active" data-nav="home" onclick="navTo('home')">home<span class="badge" id="badgeNeedsInput" style="display:none"></span></div>
    <div class="nav-item" data-nav="todos" onclick="navToTodos()">todo</div>
    <div class="nav-sep"></div>
    <div class="nav-item" data-nav="requests" onclick="navTo('requests')">requests</div>
    <div class="nav-item" data-nav="pinned" onclick="navTo('pinned')">pinned</div>
    <div class="nav-item" data-nav="failed" onclick="navTo('failed')">failed</div>
    <div class="nav-item" data-nav="jobs" onclick="navTo('jobs')">jobs</div>
    <div class="nav-item" data-nav="operator" onclick="navTo('operator')">operator</div>
    <div class="nav-sep"></div>
    <div class="nav-item" data-nav="writings" onclick="navToArtifact('writings')">writings</div>
    <div class="nav-item" data-nav="briefings" onclick="navToArtifact('briefings')">briefings</div>
    <div class="nav-item" data-nav="audio" onclick="navToArtifact('audio')">audio</div>
    <div class="nav-item" data-nav="video" onclick="navToArtifact('video')">video</div>
    <div class="nav-item" data-nav="photos" onclick="navToArtifact('photos')">photos</div>
    <div class="nav-item" data-nav="research" onclick="navToArtifact('research')">research</div>
  `;
}
function navTo(tab) {
  currentTab = tab; currentSection = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === tab));
  document.getElementById('listTitle').textContent = {home:'home',timeline:'timeline',requests:'requests',pinned:'pinned',failed:'failed',operator:'operator',jobs:'jobs'}[tab] || tab.toLowerCase();
  if (tab === 'operator') {
    currentItemId = null;
    renderOperator();
  } else if (tab === 'jobs') {
    currentItemId = null;
    renderJobs();
  } else {
    renderList();
    document.getElementById('replyBar').style.display = currentItemId ? '' : 'none';
  }
  document.getElementById('detailMessages').parentElement.querySelector('.messages').style.display = '';
}
function navToArtifact(section) {
  currentTab = 'artifacts'; currentSection = section;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === section));
  document.getElementById('listTitle').textContent = section.replace('shared/','shared ').toLowerCase();
  loadArtifactList(section);
}

// ===== Data =====
async function refresh() {
  if (!currentUser) return;
  try {
    const [hb, its, tds, op] = await Promise.all([
      apiFetch('/api/heartbeat').then(r=>r.json()),
      apiFetch(`/api/${currentUser}/items`).then(r=>r.json()),
      apiFetch(`/api/${currentUser}/todos`).then(r=>r.json()).catch(()=>[]),
      currentTab === 'operator'
        ? apiFetch(`/api/${currentUser}/operator`).then(r=>r.json()).catch(()=>null)
        : Promise.resolve(operatorSummary),
    ]);
    todos = tds;
    operatorSummary = op;
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    const age = (Date.now()-new Date(hb.timestamp).getTime())/1000;
    dot.className = age<180 ? 'dot online' : 'dot offline';
    txt.textContent = age<180 ? (hb.busy ? `${hb.active_count||0} running` : 'Online') : 'Offline';
    items = its;
    // Update badge
    const ni = items.filter(i=>i.status==='needs-input').length;
    const badge = document.getElementById('badgeNeedsInput');
    if (ni > 0) { badge.style.display=''; badge.textContent=ni; } else { badge.style.display='none'; }
    if (currentTab === 'operator') renderOperator();
    else if (currentTab === 'jobs') renderJobs();
    else if (currentTab !== 'artifacts') renderList();
    if (currentItemId && currentTab !== 'operator') renderDetail(currentItemId);
  } catch(e) { console.error(e); }
}

// ===== List Rendering =====
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let f = items.filter(i => i.status !== 'archived');
  if (q) f = f.filter(i => i.title.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.includes(q)));

  const html = [];
  if (currentTab === 'home' || currentTab === 'timeline') {
    const tenDaysAgo = new Date(new Date().setHours(0,0,0,0) - 10*86400000);
    const visible = (q ? f : f.filter(i => new Date(i.created_at||i.updated_at) >= tenDaysAgo)).filter(i=>i.type!=='request');
    // Needs-attention banner first
    const ni = visible.filter(i=>i.status==='needs-input');
    if(ni.length) { html.push(sec('Reply Needed',ni.length,'warn')); ni.forEach(i=>html.push(row(i))); }
    // Date-grouped items — pinned first within each group, then by recency
    const sortPinnedFirst = (a, b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return new Date(b.updated_at) - new Date(a.updated_at);
    };
    groupByDate(visible.filter(i=>i.status!=='needs-input')).forEach(g => {
      g.items.sort(sortPinnedFirst);
      const isRecent = g.label==='Today'||g.label==='Yesterday';
      if (isRecent) {
        html.push(sec(g.label, g.items.length)); g.items.forEach(i=>html.push(row(i)));
      } else {
        html.push(`<div class="section-label mono" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">${esc(g.label.toLowerCase())}  ${g.items.length}  ▸</div><div style="display:none">`);
        g.items.forEach(i=>html.push(row(i)));
        html.push('</div>');
      }
    });
  } else if (currentTab==='requests') {
    groupByDate(f.filter(i=>i.type==='request')).forEach(g => {
      html.push(sec(g.label)); g.items.forEach(i=>html.push(row(i)));
    });
  } else if (currentTab==='pinned') {
    f.filter(i=>i.pinned).forEach(i=>html.push(row(i)));
  } else if (currentTab==='failed') {
    f.filter(i=>i.status==='failed').forEach(i=>html.push(row(i)));
  }
  if(!html.length) html.push('<div class="empty">No items</div>');
  document.getElementById('listContent').innerHTML = html.join('');
}

function jobRow(j) {
  const icon = j.status==='done' ? '✅' : j.status==='disabled' ? '⏸️' : '⏳';
  const cost = j.usage.cost_usd > 0 ? `$${j.usage.cost_usd.toFixed(4)}` : '';
  const tokens = j.usage.tokens > 0 ? fmtTokens(j.usage.tokens) : '';
  const models = Object.keys(j.usage.models || {}).join(', ');
  const time = j.ran_at ? j.ran_at.substring(11, 16) : (j.window || '');
  const sub = [cost, tokens, models].filter(Boolean).join(' · ') || j.description;
  const dispatches = j.dispatch_count > 1 ? ` x${j.dispatch_count}` : '';
  return `<div class="row" onclick="showJobDetail('${j.name}')" style="border-left:3px solid ${j.status==='done'?'var(--accent)':j.status==='disabled'?'var(--text3)':'var(--orange)'}">
    <div class="row-icon" style="font-size:15px">${icon}</div>
    <div class="row-info"><div class="row-title" style="font-size:14px">${esc(j.name)}${dispatches}</div><div class="row-sub" style="font-size:12px">${esc(sub)}</div></div>
    <div class="row-meta"><div class="row-time" style="font-size:13px">${esc(time)}</div></div></div>`;

  html += `<div class="operator-row" style="margin-bottom:12px"><div class="operator-row-title">Status</div><div class="operator-row-sub">${esc(j.status)}${j.ran_at ? ' · Ran at: '+esc(j.ran_at) : ''} · Dispatches: ${j.dispatch_count}</div></div>`;
  if (j.dispatch_times && j.dispatch_times.length) {

  }

function fmtTokens(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function operatorSection(title, rows, emptyText) {
  const body = rows.length ? rows.join('') : `<div class="empty" style="padding:20px">${esc(emptyText || 'No items')}</div>`;
  return `<div class="operator-section"><h4>${title}</h4><div class="operator-list">${body}</div></div>`;
}

function operatorRow(title, subtitle, note) {
  return `<div class="operator-row"><div class="operator-row-title">${esc(title || '')}</div><div class="operator-row-sub">${esc(subtitle || '')}${note ? `<br>${esc(note)}` : ''}</div></div>`;
}
function sec(t,c,cls) { return `<div class="section-label ${cls||''}">${esc((t||'').toLowerCase())}${c?`<span class="cnt">${c}</span>`:''}</div>`; }

// Category style — mirrors iOS categoryStyle(). Returns {label, color, icon}.
// Tag-based first (specific), then falls back to item.type. Same visual
// taxonomy as the iOS app.
function categoryStyle(item) {
  const tags = new Set(item.tags || []);
  const has = (...names) => names.some(n => tags.has(n));
  const cv = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  if (has('alert','error','crash'))                        return {label:'alert',    color:cv('--c-alert'),    icon:'⚠'};
  if (has('symptom','checkup'))                            return {label:'health',   color:cv('--c-health'),   icon:'♥'};
  if (has('health','insight'))                             return {label:'health',   color:cv('--c-health'),   icon:'♥'};
  if (has('podcast','audio','tts'))                        return {label:'podcast',  color:cv('--c-podcast'),  icon:'♪'};
  if (has('writing','essay','draft','article'))            return {label:'writing',  color:cv('--c-writing'),  icon:'✎'};
  if (has('substack','twitter','bluesky','growth','social'))return {label:'social',  color:cv('--c-social'),   icon:'◯'};
  if (has('journal','reflect','spark'))                    return {label:'journal',  color:cv('--c-journal'),  icon:'☾'};
  if (has('explore','briefing','news','feed'))             return {label:'explore',  color:cv('--c-explore'),  icon:'◐'};
  if (has('analysis','market','research','tetra'))         return {label:'analysis', color:cv('--c-analysis'), icon:'∿'};
  if (has('photo','image','video'))                        return {label:'photo',    color:cv('--c-photo'),    icon:'◫'};
  if (has('code','pipeline','infra','agent-task'))         return {label:'code',     color:cv('--c-code'),     icon:'</>'};
  if (item.type === 'request')                             return {label:'task',     color:cv('--c-request'),  icon:'↑'};
  if (item.type === 'discussion')                          return {label:'thread',   color:cv('--c-discuss'),  icon:'❍'};
  return {label:'agent', color:cv('--c-agent'), icon:'·'};
}

// Persist read-versions in localStorage. Item is unread iff updated_at != last seen.
function readVersions() {
  try { return JSON.parse(localStorage.getItem('mira_read_versions') || '{}'); }
  catch { return {}; }
}
function markRead(id, version) {
  const m = readVersions(); m[id] = version;
  localStorage.setItem('mira_read_versions', JSON.stringify(m));
}
function isUnread(item) {
  const m = readVersions();
  return m[item.id] !== item.updated_at;
}

function row(item) {
  const s = categoryStyle(item);
  const preview = lastPreview(item);
  const time = relTime(item.updated_at);
  const unread = isUnread(item);
  const sel = item.id===currentItemId ? ' selected':'';
  let badges = '';
  if (item.pinned) badges += '<span class="row-pin">📌</span>';
  if (item.status==='needs-input') badges += '<span class="row-badge">needs reply</span>';
  if (item.status==='failed') badges += '<span class="row-badge" style="color:var(--red)">failed</span>';
  if (item.status==='working') badges += '<span class="row-badge" style="color:var(--accent)">working</span>';
  const tags = (item.tags || []).slice(0, 2).map(t => `<span class="tag">${esc(t)}</span>`).join('');
  // Row body: solid avatar (full color) + tinted bg (10% color over card)
  return `<div class="row${sel}" onclick="openDetail('${item.id}')" style="background:linear-gradient(${s.color}1A, ${s.color}1A), var(--card)">
    <div class="row-icon" style="background:${s.color}">${s.icon}</div>
    <div class="row-info">
      <div class="row-tag" style="color:${s.color}">${s.label}${badges?`  ·  ${badges}`:''}</div>
      <div class="row-title${unread?' unread':''}">${esc(item.title)}</div>
      <div class="row-sub">${esc(preview)}</div>
      ${tags?`<div class="tags">${tags}</div>`:''}
    </div>
    <div class="row-meta"><div class="row-time">${time}</div></div>
  </div>`;
}
function lastPreview(item) {
  if(!item.messages||!item.messages.length) return '';
  const m=item.messages[item.messages.length-1];
  if(m.kind==='status_card'){try{return JSON.parse(m.content).text}catch(e){return ''}}
  return (m.sender!==currentUser?'Mira: ':'')+m.content.substring(0,80);
}
function relTime(iso) {
  if(!iso) return '';
  const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return 'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function renderMd(s) {
  // Lightweight markdown: headers, bold, italic, links, paragraphs.
  // Links open in new tab via target=_blank + rel=noopener.
  let h = esc(s);
  h = h.replace(/^### (.+)$/gm, '<h4 style="margin:10px 0 4px;font-size:13px;color:var(--text2);font-weight:600">$1</h4>');
  h = h.replace(/^## (.+)$/gm, '<h3 style="margin:12px 0 6px;font-size:14px;font-weight:600">$1</h3>');
  h = h.replace(/^# (.+)$/gm, '<h2 style="margin:14px 0 8px;font-size:16px;font-weight:600">$1</h2>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  h = h.replace(/\*([^*\n]+?)\*/g, '<i>$1</i>');
  h = h.replace(/`([^`\n]+?)`/g, '<code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;font-size:.92em">$1</code>');
  h = h.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // Paragraph breaks (double newline) → <br><br>; single newline stays as <br>.
  h = h.replace(/\n{2,}/g, '<br><br>');
  h = h.replace(/\n/g, '<br>');
  return h;
}

function groupByDate(items, dateField) {
  const groups = {};
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now()-86400000).toDateString();
  for (const item of items) {
    const raw = dateField ? item[dateField] : (item.created_at || item.updated_at);
    const d = new Date(raw);
    const ds = d.toDateString();
    const label = ds===today ? 'Today' : ds===yesterday ? 'Yesterday' : d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    if (!groups[label]) groups[label] = {label, items:[], date:d};
    groups[label].items.push(item);
  }
  return Object.values(groups).sort((a,b) => b.date - a.date);
}

// ===== Detail =====
function openDetail(id) {
  currentItemId = id;
  const item = items.find(i=>i.id===id);
  if (item) markRead(id, item.updated_at); // version-based read tracking
  renderDetail(id, true);
  renderList(); // update selection highlight + drop bold on the just-read row
}
function renderDetail(id, scrollToBottom) {
  const item = items.find(i=>i.id===id);
  if(!item) return;
  document.getElementById('detailTitle').textContent = item.title;
  document.getElementById('replyBar').style.display = item.status!=='archived' ? '' : 'none';
  const el = document.getElementById('detailMessages');
  const prevCount = el.children.length;
  const prevScroll = el.scrollTop;

  // Collapse status_cards: keep only the LAST one in the thread (mirrors iOS
  // behaviour where emit_status_card replaces prior cards instead of stacking).
  const msgs = (item.messages || []).slice();
  let lastStatusIdx = -1;
  for (let i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].kind === 'status_card') { lastStatusIdx = i; break; }
  }
  const filtered = msgs.filter((m, i) => m.kind !== 'status_card' || i === lastStatusIdx);

  el.innerHTML = filtered.map(m => {
    const cls = m.kind==='error'?'error':m.kind==='status_card'?'status_card':m.sender===currentUser?'user':'agent';
    let c = m.content;
    if (m.kind === 'status_card') {
      try { c = JSON.parse(c).text; } catch { c = ''; }
    }
    const t = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    const img = m.image_path ? `<img src="/api/${currentUser}/artifacts/${m.image_path}" style="max-width:100%;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="window.open(this.src)" onerror="this.style.display='none'">` : '';
    if (m.kind === 'status_card') {
      return `<div class="msg status_card">⏳ ${esc(c)}</div>`;
    }
    return `<div class="msg ${cls}">${img}${renderMd(c)}<div class="msg-time">${t}</div></div>`;
  }).join('');
  const newCount = el.children.length;
  if (scrollToBottom || prevCount === 0 || newCount > prevCount) {
    el.scrollTop = el.scrollHeight;
  } else {
    el.scrollTop = prevScroll;
  }
}

// ===== Artifacts =====
async function loadArtifactList(section) {
  const res = await apiFetch(`/api/${currentUser}/artifacts/${section}`);
  const files = await res.json();
  const el = document.getElementById('listContent');
  if(!files.length) { el.innerHTML='<div class="empty">No files</div>'; return; }
  el.innerHTML = '<ul class="artifact-list">' + files.map(f => {
    const sz = f.size > 1024 ? Math.round(f.size/1024)+'KB' : f.size+'B';
    const icon = f.name.endsWith('/')? '📁' : f.name.endsWith('.md')?'📄':'📎';
    return `<li onclick="openArtifact('${section}','${f.name}')">${icon} ${esc(f.name)}<span class="size">${f.name.endsWith('/')?'':sz}</span></li>`;
  }).join('') + '</ul>';
  // Clear detail
  document.getElementById('detailTitle').textContent = section;
  document.getElementById('detailMessages').innerHTML = '<div class="empty">Select a file to view</div>';
  document.getElementById('replyBar').style.display = 'none';
}
async function openArtifact(section, filename) {
  if(filename.endsWith('/')) { navToArtifact(section+'/'+filename.slice(0,-1)); return; }
  document.getElementById('detailTitle').textContent = filename;
  document.getElementById('replyBar').style.display = 'none';
  const el = document.getElementById('detailMessages');
  try {
    const res = await apiFetch(`/api/${currentUser}/artifacts/${section}/${filename}`);
    const text = await res.text();
    el.innerHTML = `<div class="artifact-content">${esc(text)}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty">Cannot load file</div>'; }
}

// ===== Actions =====
async function sendNew() {
  const inp=document.getElementById('newInput'); const t=inp.value.trim(); if(!t||!currentUser)return; inp.value='';
  await apiFetch(`/api/${currentUser}/request`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.substring(0,50),content:t})});
  refresh();
}
async function sendReply() {
  const inp=document.getElementById('replyInput'); const t=inp.value.trim(); if(!t||!currentUser)return; inp.value='';
  // Todo followup — server writes both followup + command for Mira to respond
  if (currentTab==='todos' && currentTodoId) {
    await apiFetch(`/api/${currentUser}/todos/${currentTodoId}/followup`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t,source:'user'})});
    loadTodos();
    return;
  }
  // Regular item reply
  if(!currentItemId) return;
  const item = items.find(i=>i.id===currentItemId);
  if(item) {
    const now = new Date().toISOString();
    item.messages.push({id:Math.random().toString(36).slice(2,10), sender:currentUser, content:t, timestamp:now, kind:'text'});
    renderDetail(currentItemId);
  }
  await apiFetch(`/api/${currentUser}/items/${currentItemId}/reply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:t})});
  refresh();
}
async function pinCurrent() { if(!currentUser||!currentItemId)return; await apiFetch(`/api/${currentUser}/items/${currentItemId}/pin`,{method:'POST'}); refresh(); }
async function shareCurrent() { if(!currentUser||!currentItemId)return; await apiFetch(`/api/${currentUser}/items/${currentItemId}/share`,{method:'POST'}); alert('Shared!'); }
async function archiveCurrent() { if(!currentUser||!currentItemId)return; await apiFetch(`/api/${currentUser}/items/${currentItemId}/archive`,{method:'POST'}); currentItemId=null; refresh(); }

// ===== Todos =====
let todos = [], currentTodoId = null;
async function navToTodos() {
  currentTab = 'todos'; currentSection = null; currentItemId = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === 'todos'));
  document.getElementById('listTitle').textContent = 'todo';
  await loadTodos();
}
async function loadTodos() {
  const res = await apiFetch(`/api/${currentUser}/todos`);
  todos = await res.json();
  renderTodos();
  if (currentTodoId) openTodoDetail(currentTodoId);
}
function renderTodos() {
  const el = document.getElementById('listContent');
  const prioOrder = {high:0,medium:1,low:2};
  const sortByPrio = (a,b) => (prioOrder[a.priority]||1) - (prioOrder[b.priority]||1);
  const pending = todos.filter(t=>t.status==='pending').sort(sortByPrio);
  const working = todos.filter(t=>t.status==='working').sort(sortByPrio);
  // Hide stale working items (no createdAt OR >14d old) — same rule as iOS
  const cutoff = Date.now() - 14*86400000;
  const isStale = t => !t.created_at || (new Date(t.updated_at||t.created_at).getTime() < cutoff);
  const workingActive = working.filter(t => !isStale(t));
  const workingStale = working.filter(isStale);
  const done = todos.filter(t=>t.status==='done').slice(0,10);
  const html = [];
  if(workingActive.length) { html.push(sec('working',workingActive.length)); workingActive.forEach(t=>html.push(todoRow(t))); }
  if(pending.length) { html.push(sec('pending',pending.length)); pending.forEach(t=>html.push(todoRow(t))); }
  if(workingStale.length) {
    html.push(`<div class="section-label" style="cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">stale<span class="cnt">${workingStale.length}</span> ▸</div><div style="display:none">`);
    workingStale.forEach(t=>html.push(todoRow(t)));
    html.push('</div>');
  }
  if(done.length) { html.push(sec('done',done.length)); done.forEach(t=>html.push(todoRow(t))); }
  if(!html.length) html.push('<div class="empty">no todos yet · type "high: ..." or just text</div>');
  el.innerHTML = html.join('');

  if (!currentTodoId) {
    document.getElementById('detailTitle').textContent = 'Todo List';
    document.getElementById('detailMessages').innerHTML = '<div class="empty">select a todo to see details</div>';
    document.getElementById('replyBar').style.display = 'none';
  }
}
function todoPrioColor(p) {
  const cv = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  if (p === 'high') return cv('--c-alert');
  if (p === 'low') return cv('--c-writing');
  return cv('--c-analysis');
}
function todoRow(t) {
  const color = todoPrioColor(t.priority);
  const sel = t.id===currentTodoId ? ' selected':'';
  const fuCount = (t.followups||[]).length;
  const time = relTime(t.updated_at);
  const dim = t.status==='done' ? 'opacity:0.5;' : '';
  return `<div class="row${sel}" style="background:linear-gradient(${color}1A,${color}1A),var(--card);${dim}" onclick="openTodoDetail('${t.id}')">
    <div style="width:8px;height:8px;border-radius:50%;background:${color};margin-top:7px;flex-shrink:0"></div>
    <div class="row-info">
      <div class="row-tag" style="color:${color}">${t.priority}${fuCount?`  ·  ${fuCount} note${fuCount===1?'':'s'}`:''}</div>
      <div class="row-title${t.status==='done'?'':' unread'}" style="white-space:normal;${t.status==='done'?'text-decoration:line-through':''}">${esc(t.title)}</div>
    </div>
    <div class="row-meta">
      <div class="row-time">${time}</div>
      ${t.status==='pending'?`<button onclick="event.stopPropagation();completeTodo('${t.id}')" style="background:var(--accent);color:var(--bg);border:none;border-radius:50%;width:22px;height:22px;font-size:11px;font-weight:600;cursor:pointer;margin-top:4px">✓</button>`:''}
    </div></div>`;
}
function openTodoDetail(id) {
  currentTodoId = id;
  const t = todos.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('detailTitle').textContent = t.title;
  const fus = t.followups || [];
  let html = '<div style="display:flex;flex-direction:column;gap:6px;padding:16px">';
  // Info header
  html += `<div style="padding:8px 12px;background:var(--card);border-radius:8px;font-size:14px;color:var(--text2)">
    <b>Priority:</b> ${t.priority} · <b>Status:</b> ${t.status} · <b>Created:</b> ${new Date(t.created_at).toLocaleDateString()}</div>`;
  // Original content as first message
  html += `<div class="msg user" style="align-self:flex-end">${esc(t.title)}<div class="msg-time">${new Date(t.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
  // Followups as chat messages
  for (const fu of fus) {
    const cls = fu.source === 'agent' ? 'agent' : 'user';
    const align = fu.source === 'agent' ? 'flex-start' : 'flex-end';
    const time = fu.timestamp ? new Date(fu.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    html += `<div class="msg ${cls}" style="align-self:${align}">${renderMd(fu.content)}<div class="msg-time">${fu.source==='agent'?'Mira · ':''}${time}</div></div>`;
  }
  html += '</div>';
  document.getElementById('detailMessages').innerHTML = html;
  document.getElementById('detailMessages').scrollTop = document.getElementById('detailMessages').scrollHeight;
  // Show reply bar for adding followups
  document.getElementById('replyBar').style.display = '';
  renderTodos(); // refresh selection highlight
}
async function completeTodo(id) { await apiFetch(`/api/${currentUser}/todos/${id}/done`,{method:'POST'}); loadTodos(); }
async function deleteTodo(id) { if(currentTodoId===id) currentTodoId=null; await apiFetch(`/api/${currentUser}/todos/${id}`,{method:'DELETE'}); loadTodos(); }
async function updateTodoPrio(id, prio) { await apiFetch(`/api/${currentUser}/todos/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({priority:prio})}); loadTodos(); }

// Override new input for todo tab
const origSendNew = sendNew;
async function sendNew() {
  if(currentTab==='todos') {
    const inp=document.getElementById('newInput'); const t=inp.value.trim(); if(!t||!currentUser)return; inp.value='';
    // Parse priority: "high: do something" or just "do something"
    let priority='medium', title=t;
    const m=t.match(/^(high|medium|low)[:\s]+(.+)/i);
    if(m){priority=m[1].toLowerCase();title=m[2];}
    await apiFetch(`/api/${currentUser}/todos`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,priority})});
    loadTodos();
  } else {
    const inp=document.getElementById('newInput'); const t=inp.value.trim(); if(!t||!currentUser)return; inp.value='';
    await apiFetch(`/api/${currentUser}/request`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.substring(0,50),content:t})});
    refresh();
  }
}

// ===== Browser Notifications via SSE =====
let eventSource = null;
const notifiedIds = new Set();

function startSSE(userId) {
  if (eventSource) eventSource.close();
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();

  eventSource = new EventSource(tokenizedUrl(`/api/${userId}/events`));
  eventSource.onmessage = (e) => {
    try {
      const item = JSON.parse(e.data);
      if (!item || !item.id) return;
      const key = `${item.id}_${item.updated_at}`;
      if (notifiedIds.has(key)) return;
      notifiedIds.add(key);
      // Only notify for actionable states
      if (item.status === 'needs-input' || item.status === 'done' || item.type === 'feed') {
        showBrowserNotification(item);
      }
      // Also refresh the UI
      refresh();
    } catch {}
  };
  eventSource.onerror = () => {
    // SSE will auto-reconnect
  };
}

function showBrowserNotification(item) {
  if (Notification.permission !== 'granted') return;
  let title, body;
  if (item.status === 'needs-input') {
    title = 'Needs your reply';
    body = item.title;
  } else if (item.status === 'done' && item.origin === 'user') {
    title = `Done: ${item.title}`;
    body = (item.messages && item.messages.length) ? item.messages[item.messages.length-1].content.substring(0,100) : '';
  } else if (item.type === 'feed') {
    const tags = item.tags || [];
    if (tags.includes('briefing')) title = 'Briefing';
    else if (tags.includes('journal')) title = 'Journal';
    else if (tags.includes('trading')) title = 'Trading Signal';
    else title = 'Mira';
    body = item.title;
  } else return;

  const n = new Notification(title, { body, icon: '/favicon.ico', tag: item.id });
  n.onclick = () => { window.focus(); loadItem(item.id); };
}

// ===== Init =====
window.onload = () => {
  loadProfiles();
  const id=localStorage.getItem('mira_profile'), name=localStorage.getItem('mira_name');
  if(id&&name) selectProfile(id,name);
};
