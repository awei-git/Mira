<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="darkreader-lock">
<link rel="icon" type="image/png" href="/mira-icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Mira Backend</title>
<style>
  :root{color-scheme:dark;--bg:#191715;--surface:#24211d;--rail:#211d19;--rail-strong:#2b261f;--text:#f4efe7;--muted:#b8afa5;--faint:#8e8479;--line:#3a332b;--line-strong:#51483d;--accent:#d97757;--accent-strong:#e08a6d;--accent-soft:#3a241c;--accent-text:#1f140f;--good:#77c99a;--warn:#d19a45;--bad:#de6f62;--violet:#b18adf;--rose:#d988a7;--blue:#7ba7d9;--shadow:0 1px 2px rgba(0,0,0,.22),0 12px 34px rgba(0,0,0,.2)}
  :root,html,body{background:var(--bg)!important;color:var(--text)!important}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;letter-spacing:0;line-height:1.45}
  .shell{display:grid;grid-template-columns:236px minmax(0,1fr);min-height:100vh}
  aside{position:sticky;top:0;height:100vh;padding:18px 12px;background:var(--rail)!important;border-right:1px solid var(--line);overflow:auto}
  .brand{display:flex;align-items:center;gap:12px;margin:0 0 20px 2px}
  .mark{width:38px;height:38px;border-radius:8px;background:var(--accent)!important;box-shadow:0 0 0 1px rgba(244,239,231,.1),0 8px 22px rgba(217,119,87,.22);overflow:hidden}
  .mark img{display:block;width:100%;height:100%;object-fit:cover}
  .brand-name{font-size:19px;font-weight:700;color:var(--text)!important}.brand-sub{font-size:13px;color:var(--muted)!important;margin-top:1px}
  select,.button{width:100%;border:1px solid var(--line);background:var(--surface)!important;color:var(--text)!important;border-radius:10px;padding:9px 10px;font:inherit;accent-color:var(--accent)}
  select:focus,.button:focus,.refresh:focus{outline:2px solid var(--accent);outline-offset:2px;border-color:var(--accent)}
  nav{display:flex;flex-direction:column;gap:3px;margin-top:18px}
  nav button{display:flex;align-items:center;gap:8px;border:0;background:transparent!important;color:var(--muted)!important;text-align:left;padding:10px 11px;border-radius:9px;cursor:pointer;font:inherit;font-weight:600}
  nav button.active{background:var(--accent-soft)!important;color:var(--accent-strong)!important;box-shadow:inset 3px 0 0 var(--accent)}
  nav button:hover{background:var(--rail-strong)!important;color:var(--accent-strong)!important}
  .meta{margin-top:16px;color:var(--muted)!important;font-size:11px;line-height:1.55}.meta a{color:var(--accent-strong)!important}
  main{min-width:0;padding:24px 30px 52px}.content{max-width:none;margin:0}
  .top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:14px}
  h1{font-size:27px;line-height:1.15;margin:0 0 4px;font-weight:720;color:var(--text)!important}
  h2{font-size:18px;margin:28px 0 11px;font-weight:700;color:var(--text)!important}.subtitle{color:var(--muted)!important}
  .actions{display:flex;align-items:center;gap:10px}.refresh{width:auto;border:1px solid var(--accent);border-radius:10px;background:var(--accent)!important;color:var(--accent-text)!important;padding:8px 11px;cursor:pointer;font-weight:650}.refresh:hover{background:var(--accent-strong)!important;border-color:var(--accent-strong)}
  .stamp{font-size:12px;color:var(--muted)!important;text-align:right}.status{display:inline-flex;align-items:center;gap:7px;border:1px solid color-mix(in srgb,var(--accent) 45%,var(--line));background:var(--accent-soft)!important;border-radius:999px;padding:6px 10px;color:var(--accent-strong)!important;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)!important;box-shadow:0 0 0 3px rgba(217,119,87,.18)}
  .metrics{display:grid;grid-template-columns:1fr;gap:7px;margin-top:14px}.metric{background:var(--surface)!important;border:1px solid var(--line);border-radius:8px;padding:9px 10px;box-shadow:none}
  .metric:first-child{border-color:color-mix(in srgb,var(--accent) 52%,var(--line));background:linear-gradient(180deg,var(--accent-soft),var(--surface))!important}.metric:first-child .metric-value{color:var(--accent-strong)!important}
  .metric-label{font-size:11px;text-transform:uppercase;font-weight:760;color:var(--muted)!important}.metric-value{font-size:18px;font-weight:720;margin-top:2px;color:var(--text)!important}.metric-note{font-size:12px;color:var(--faint)!important;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .panel{background:var(--surface)!important;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px}.panel-title{font-size:13px;color:var(--accent-strong)!important;font-weight:740;text-transform:uppercase;letter-spacing:.045em;margin-bottom:12px}
  .kv{display:grid;grid-template-columns:132px minmax(0,1fr);gap:10px;padding:9px 0;border-top:1px solid var(--line)}.kv:first-child{border-top:0;padding-top:0}.k{color:var(--muted)!important}.v{min-width:0;color:var(--text)!important;word-break:break-word}
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:13px}.muted{color:var(--muted)!important}
  .list{display:flex;flex-direction:column;gap:8px}.scroll-list{max-height:520px;overflow:auto;padding-right:3px}.item{display:block;border:1px solid var(--line);background:#2a251f!important;border-radius:8px;padding:10px 11px;text-decoration:none;color:inherit}.item:hover{border-color:var(--accent);background:#332b24!important}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:680;color:var(--text)!important}.item-sub{font-size:12px;color:var(--muted)!important;margin-top:3px;white-space:pre-wrap;word-break:break-word}.open{color:var(--accent-strong)!important;text-decoration:underline;font-weight:700;white-space:nowrap}
  .chips{display:flex;gap:6px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;border:1px solid color-mix(in srgb,var(--accent) 28%,var(--line));background:#2a251f!important;color:var(--accent-strong)!important;border-radius:999px;padding:4px 8px;font-size:12px;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .status-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;font-size:13px;font-weight:700;text-transform:capitalize}.status-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}.green{color:var(--good);background:rgba(99,217,144,.13)}.yellow{color:var(--warn);background:rgba(242,184,75,.14)}.red{color:var(--bad);background:rgba(240,123,114,.14)}.gray{color:var(--faint);background:rgba(148,154,166,.14)}
  .steps{display:grid;gap:7px;min-width:360px}.step{display:grid;grid-template-columns:120px 82px 1fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:8px;padding:8px;background:#2a251f!important}.step-name{font-weight:650}.step-meta{font-size:12px;color:var(--muted)!important}.step-error{color:var(--bad)!important}
  .dag-list{display:grid;gap:10px}
  .dag{border:1px solid var(--line);border-radius:8px;background:var(--surface)!important;box-shadow:var(--shadow);padding:12px}
  .dag-head{display:grid;grid-template-columns:180px minmax(170px,1fr) 150px 170px;gap:10px;align-items:start}
  .dag-name{font-weight:760}
  .dag-meta{font-size:12px;color:var(--muted)!important}
  .dag-steps{display:flex;gap:8px;overflow:auto;padding-top:11px}
  .task{min-width:150px;max-width:190px;border:1px solid var(--line);border-radius:7px;padding:8px;background:var(--rail-strong)!important}
  .task.green{border-color:rgba(119,201,154,.42);background:rgba(119,201,154,.09)!important}
  .task.yellow{border-color:rgba(209,154,69,.48);background:rgba(209,154,69,.11)!important}
  .task.red{border-color:rgba(222,111,98,.55);background:rgba(222,111,98,.12)!important}
  .t-title{font-weight:700;overflow:hidden;text-overflow:ellipsis}
  .t-meta{font-size:11px;color:var(--muted)!important;margin-top:4px}
  .t-error{color:var(--bad)!important;white-space:pre-wrap}
  .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--surface)!important;box-shadow:var(--shadow)}table{width:100%;border-collapse:collapse;background:transparent!important}th,td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:13px;color:var(--text)!important}th{position:sticky;top:0;background:#243349!important;color:var(--muted)!important;font-size:12px;font-weight:740;text-transform:uppercase;letter-spacing:.045em}tr:last-child td{border-bottom:0}
  .wide{min-width:960px}.section{scroll-margin-top:24px}.empty{color:var(--muted)!important;font-size:13px}
  .chart{display:grid;grid-template-columns:repeat(30,minmax(14px,1fr));gap:4px;align-items:end;height:160px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--rail)!important}
  .bar{background:var(--accent)!important;border-radius:4px 4px 0 0;min-height:2px;position:relative}
  .bar:nth-child(3n){background:var(--blue)!important}.bar:nth-child(4n){background:var(--violet)!important}
  .bar span{position:absolute;left:50%;bottom:-20px;transform:translateX(-50%);font-size:10px;color:var(--faint)!important}
  .range-tabs{display:flex;gap:6px;margin-bottom:10px}
  .range-tabs button{border:1px solid var(--line);background:#2a251f!important;color:var(--muted)!important;border-radius:999px;padding:5px 9px;cursor:pointer}
  .range-tabs button.active{background:var(--accent-soft)!important;color:var(--accent-strong)!important;border-color:var(--accent)}
  @media(max-width:1050px){.shell{grid-template-columns:1fr}aside{position:relative;height:auto}.meta{position:static;margin-top:18px}.metrics,.grid-2,.grid-3{grid-template-columns:1fr}main{padding:22px 16px}.top{flex-direction:column}.actions{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="brand"><div class="mark"><img src="/mira-icon.png" alt=""></div><div><div class="brand-name">Mira</div><div class="brand-sub">Backend</div></div></div>
    <select id="profile"></select>
    <nav id="nav"></nav>
    <div class="metrics" id="cards"></div>
    <div class="meta"><div id="stamp"></div><div class="mono" id="apiPath"></div></div>
  </aside>
  <main><div class="content">
    <div class="top">
      <div><h1>Mira backend</h1><div class="subtitle">Operational status, memory changes, outputs, and usage.</div></div>
      <div class="actions"><span class="status"><span class="dot"></span><span id="healthText">Loading</span></span><button class="refresh" id="refresh">Refresh</button></div>
    </div>
    <section class="section" id="pipelines"><h2>Pipelines</h2><div id="pipelineView"></div></section>
    <section class="section" id="memory"><h2>Memory</h2><div class="grid-3"><div class="panel"><div class="panel-title">Memory window</div><div id="kernel"></div></div><div class="panel"><div class="panel-title">Failure lessons</div><div id="lessons"></div></div><div class="panel"><div class="panel-title">Recent commits</div><div id="commits"></div></div></div></section>
    <section class="section" id="usage"><h2>Token usage</h2><div class="grid-2"><div class="panel"><div class="panel-title">Daily tokens</div><div id="tokenChart"></div></div><div class="panel"><div class="panel-title">Model breakdown</div><div id="usageBreakdown"></div></div></div></section>
    <section class="section" id="outputs"><h2>Outputs</h2><div class="grid-3"><div class="panel"><div class="panel-title">Artifacts</div><div id="artifacts"></div></div><div class="panel"><div class="panel-title">Recent items</div><div id="items"></div></div><div class="panel"><div class="panel-title">Jobs</div><div id="jobs"></div></div></div><h2>Agent usage</h2><div id="agentStats"></div></section>
    <section class="section" id="access"><h2>Access</h2><div class="grid-2"><div class="panel"><div class="panel-title">Connection</div><div id="service"></div></div><div class="panel"><div class="panel-title">Security</div><div id="security"></div></div></div></section>
  </div></main>
</div>
<script>
let currentUser = localStorage.getItem('mira_profile') || 'ang';
const sections = ['pipelines','memory','usage','outputs','access'];
const themeVars = { '--bg':'#191715','--surface':'#24211d','--rail':'#211d19','--rail-strong':'#2b261f','--text':'#f4efe7','--muted':'#b8afa5','--faint':'#8e8479','--line':'#3a332b','--line-strong':'#51483d','--accent':'#d97757','--accent-strong':'#e08a6d','--accent-soft':'#3a241c','--accent-text':'#1f140f','--good':'#77c99a','--warn':'#d19a45','--bad':'#de6f62','--violet':'#b18adf','--rose':'#d988a7','--blue':'#7ba7d9' };
const $ = id => document.getElementById(id);
function forceDark(){Object.entries(themeVars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v,'important')); document.documentElement.style.colorScheme='dark'; document.body.style.backgroundColor=themeVars['--bg']; document.body.style.color=themeVars['--text']}
function el(tag, value='', className=''){const node=document.createElement(tag); if(className)node.className=className; node.textContent=value == null ? '' : String(value); return node}
function clear(node){node.replaceChildren(); return node}
function kv(k,v,mono=false){const row=el('div','', 'kv'); row.append(el('div',k,'k'), el('div',v, mono?'v mono':'v')); return row}
function item(title, sub, href=''){const row=href?document.createElement('a'):el('div'); row.className='item'; if(href){row.href=href; row.target='_blank'; row.rel='noopener'} const head=el('div','', 'item-title'); head.append(el('span',title), href?el('span','Open','open'):el('span','')); row.append(head, el('div',sub || '', 'item-sub mono')); return row}
function list(node, rows, empty='No records'){clear(node); if(!rows.length){node.append(el('div',empty,'empty')); return} const wrap=el('div','', 'list'); rows.forEach(r=>wrap.append(r)); node.append(wrap)}
function scrollList(node, rows, empty='No records'){clear(node); if(!rows.length){node.append(el('div',empty,'empty')); return} const wrap=el('div','', 'list scroll-list'); rows.forEach(r=>wrap.append(r)); node.append(wrap)}
function metric(label, value, note){const card=el('div','', 'metric'); card.append(el('div',label,'metric-label'), el('div',value,'metric-value'), el('div',note,'metric-note')); return card}
function chip(value){return el('span', value, 'chip')}
function chips(values, limit=7){const wrap=el('div','', 'chips'); const shown=(values||[]).slice(0,limit); shown.forEach(v=>wrap.append(chip(v))); if((values||[]).length>shown.length)wrap.append(chip(`+${values.length-shown.length}`)); return wrap}
function statusPill(status, label=''){return el('span', label || status || 'gray', `status-pill ${status||'gray'}`)}
function stepList(steps){const wrap=el('div','', 'steps'); (steps||[]).forEach(s=>{const row=el('div','', 'step'); row.append(el('div',s.name||'', 'step-name'), statusPill(s.status||'gray'), el('div', `${s.model||''} · $${Number(s.cost_usd||0).toFixed(4)} · ${fmtTokens(s.tokens||0)} tok${s.error ? '\n' + s.error : ''}`, s.error?'step-meta step-error':'step-meta')); wrap.append(row)}); return wrap}
function table(node, headers, rows){clear(node); if(!rows.length){const panel=el('div','', 'panel'); panel.append(el('div','No records','empty')); node.append(panel); return} const wrap=el('div','', 'table-wrap'); const t=el('table','', 'wide'); const thead=document.createElement('thead'); const hrow=document.createElement('tr'); headers.forEach(h=>hrow.append(el('th',h))); thead.append(hrow); const tbody=document.createElement('tbody'); rows.forEach(cells=>{const tr=document.createElement('tr'); cells.forEach(cell=>{const td=document.createElement('td'); if(cell instanceof Node)td.append(cell); else if(Array.isArray(cell))cell.forEach(v=>td.append(v)); else td.textContent=cell == null ? '' : String(cell); tr.append(td)}); tbody.append(tr)}); t.append(thead,tbody); wrap.append(t); node.append(wrap)}
async function api(url){const res=await fetch(url); if(!res.ok)throw new Error(`HTTP ${res.status}`); return res.json()}
function fmtTokens(n){n=Number(n||0); if(n>=1000000)return (n/1000000).toFixed(1)+'M'; if(n>=1000)return (n/1000).toFixed(1)+'K'; return String(n)}
function timeAgo(iso){const t=Date.parse(iso||''); if(!t)return ''; const sec=Math.max(0,Math.round((Date.now()-t)/1000)); if(sec<90)return `${sec}s ago`; const min=Math.round(sec/60); if(min<90)return `${min}m ago`; const hr=Math.round(min/60); return `${hr}h ago`}
function jump(id, btn){$(id).scrollIntoView({behavior:'smooth'}); document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); btn.classList.add('active')}
function buildNav(){const nav=$('nav'); clear(nav); sections.forEach((id,i)=>{const b=el('button', id[0].toUpperCase()+id.slice(1)); if(i===0)b.classList.add('active'); b.onclick=()=>jump(id,b); nav.append(b)})}
async function loadProfiles(){const data=await api('/api/profiles'); const s=$('profile'); clear(s); data.profiles.forEach(p=>{const o=document.createElement('option'); o.value=p.id; o.textContent=`${p.display_name} · ${p.agent_name}`; s.append(o)}); s.value=currentUser; s.onchange=()=>{currentUser=s.value; localStorage.setItem('mira_profile', currentUser); loadDashboard()}}
let dashboard = null;
let usageRange = 'last_7d';
function renderDag(rows){
  const root=clear($('pipelineView')), wrap=el('div','', 'dag-list');
  rows.forEach(p=>{
    const usage=p.usage||{};
    const dag=el('div','', 'dag');
    const head=el('div','', 'dag-head');
    head.append(el('div',p.name,'dag-name'),el('div',p.trigger,'dag-meta'),statusPill(p.status||'gray',p.status_text||p.status||'not observed'),el('div',`$${Number(usage.cost_usd||0).toFixed(4)} · ${fmtTokens(usage.tokens||0)} tok`,'dag-meta'));
    dag.append(head);
    if(p.status_detail)dag.append(el('div',p.status_detail,'dag-meta'));
    const steps=el('div','', 'dag-steps');
    (p.steps||[]).forEach(s=>{
      const step=typeof s === 'string' ? {name:s,status:p.status||'gray'} : s;
      const box=el('div','', `task ${step.status||'gray'}`);
      box.append(el('div',step.name||'', 't-title'),el('div',`${step.model||'deterministic'} · $${Number(step.cost_usd||0).toFixed(4)} · ${fmtTokens(step.tokens||0)} tok`,'t-meta'));
      if(step.error)box.append(el('div',step.error,'t-meta t-error'));
      steps.append(box);
    });
    dag.append(steps); wrap.append(dag);
  });
  root.append(wrap);
}
function renderUsage(data){
  const jobs=data.outputs.jobs||{}, hist=jobs.usage_history||{};
  let daily=hist.daily||[];
  if(!daily.length && (jobs.usage_totals||{}).tokens)daily=[{date:jobs.date||'today',tokens:jobs.usage_totals.tokens,calls:jobs.usage_totals.calls,cost_usd:jobs.usage_totals.cost_usd}];
  const max=Math.max(1,...daily.map(d=>d.tokens||0));
  const chart=clear($('tokenChart')), bars=el('div','', 'chart');
  daily.forEach(d=>{const bar=el('div','', 'bar'); bar.style.height=`${Math.max(2,Math.round((d.tokens||0)/max*132))}px`; bar.title=`${d.date}: ${fmtTokens(d.tokens)} tokens, ${d.calls} calls`; bar.append(el('span',d.date.slice(8))); bars.append(bar)});
  chart.append(bars);
  const root=clear($('usageBreakdown')), tabs=el('div','', 'range-tabs');
  ['today','last_7d','last_30d'].forEach(name=>{const b=el('button',name.replace('_',' ')); if(name===usageRange)b.classList.add('active'); b.onclick=()=>{usageRange=name; renderUsage(dashboard)}; tabs.append(b)});
  root.append(tabs);
  let total=(hist.totals||{})[usageRange]||{};
  if(!(total.tokens||0) && (jobs.usage_totals||{}).tokens)total={...jobs.usage_totals,models:{}};
  if(!Object.keys(total.models||{}).length){
    total.models={};
    (jobs.recent||[]).forEach(j=>Object.entries(((j.usage||{}).models)||{}).forEach(([model,stats])=>{
      const dest=total.models[model]||(total.models[model]={tokens:0,calls:0,cost_usd:0});
      dest.tokens+=stats.tokens||0; dest.calls+=stats.calls||0; dest.cost_usd+=stats.cost_usd||0;
    }));
  }
  root.append(kv('total', `${fmtTokens(total.tokens||0)} tokens · ${total.calls||0} calls · $${Number(total.cost_usd||0).toFixed(4)}`));
  const holder=el('div');
  table(holder,['model','tokens','calls','cost'],Object.entries(total.models||{}).sort((a,b)=>(b[1].tokens||0)-(a[1].tokens||0)).map(([model,stats])=>[model,fmtTokens(stats.tokens),stats.calls,`$${Number(stats.cost_usd||0).toFixed(4)}`]));
  root.append(holder);
}
async function openArtifactSection(section){
  const sectionHref=section.href || `/api/${currentUser}/artifacts/${section.name}`;
  const rows=await api(sectionHref);
  const entries=rows.map(r=>item(r.name,`${r.size||0} bytes · ${r.modified||''}`,`${sectionHref}/${encodeURIComponent(r.name.replace(/\/$/,''))}`));
  const back=item('Back to artifact sections','');
  back.onclick=()=>{renderArtifacts(dashboard);return false};
  list($('artifacts'),[back,...entries],'No files');
}
function renderArtifacts(data){
  list($('artifacts'),(data.outputs.artifacts||[]).map(a=>{const row=item(a.name,`${a.count} item(s)`); row.onclick=()=>{openArtifactSection(a);return false}; row.querySelector('.item-title').append(el('span','Open','open')); return row}),'No artifact sections');
}
async function loadDashboard(){
  forceDark();
  $('apiPath').textContent = `/api/${currentUser}/backend-dashboard`;
  const data = dashboard = await api(`/api/${currentUser}/backend-dashboard`);
  const hb=data.service.heartbeat||{}, queues=data.memory.queues||{}, jobs=data.outputs.jobs||{}, history=jobs.usage_history||{}, usage=(history.totals||{}).today || jobs.usage_totals||{}, memStatus=data.memory.status||{}, memCounts=memStatus.counts||{};
  const queueCount=Object.values(queues).reduce((n,rows)=>n+rows.length,0);
  const redPipelines=(data.pipelines||[]).filter(p=>p.status==='red').length;
  const yellowPipelines=(data.pipelines||[]).filter(p=>p.status==='yellow').length;
  const grayPipelines=(data.pipelines||[]).filter(p=>p.status==='gray').length;
  $('stamp').textContent = data.server_time;
  $('healthText').textContent = hb.busy ? `${hb.active_count||0} active` : `Online · ${timeAgo(hb.timestamp)}`;
  clear($('cards')).append(
    metric('Service', hb.busy ? `${hb.active_count||0} active` : 'Online', hb.status || 'heartbeat'),
    metric('Pipelines', data.pipelines.length, `${redPipelines} red · ${yellowPipelines} yellow · ${grayPipelines} not observed`),
    metric('Today tokens', fmtTokens(usage.tokens||0), `${usage.calls||0} calls · $${Number(usage.cost_usd||0).toFixed(2)}`),
    metric('Memory', (data.memory.commits||[]).length, `${queueCount} queued · ${memCounts.items||0} items`)
  );
  clear($('kernel')).append(statusPill(memStatus.overall||'gray','memory'), kv('event dates', `${((memStatus.date_range||{}).first)||'none'} -> ${((memStatus.date_range||{}).last)||'none'}`), kv('item dates', `${((memStatus.item_date_range||{}).first)||'none'} -> ${((memStatus.item_date_range||{}).last)||'none'}`), kv('counts', `commits=${memCounts.commits||(data.memory.commits||[]).length} events=${memCounts.ledger||(data.memory.ledger||[]).length} items=${memCounts.items||0}`), kv('errors', (memStatus.errors||[]).join('; ') || 'none'));
  list($('lessons'), (data.memory.kernel.failure_lessons||[]).map(s=>item(s.incident, `date=${s.date}\nroot=${s.root_cause}\nchange=${s.behavioral_change}\nreinforced=${s.reinforcement_count}`)), 'No failure lessons recorded');
  list($('commits'), (data.memory.commits||[]).map(c=>item(`${c.status} · ${c.pipeline}`, `time=${c.timestamp}\n${c.summary || (c.findings||[]).join('; ')}\ncommitted=${(c.committed_actions||[]).length} rejected=${(c.rejected_actions||[]).length} quarantined=${(c.quarantined_actions||[]).length}`)), 'No recent memory commits');
  renderDag(data.pipelines||[]);
  renderUsage(data);
  renderArtifacts(data);
  scrollList($('jobs'), (jobs.recent||[]).map(j=>item(`${j.status} · ${j.name}`, `$${Number((j.usage||{}).cost_usd||0).toFixed(4)} · ${fmtTokens((j.usage||{}).tokens||0)} tokens · dispatch ${j.dispatch_count||0} · ${j.ran_at||''}`)), 'No jobs');
  scrollList($('items'), (data.outputs.recent_items||[]).map(i=>item(`${i.status} · ${i.title || i.id}`, `${i.id}\n${i.type} · ${(i.tags||[]).join(', ')}\n${i.updated_at}`, i.href||`/api/${currentUser}/items/${i.id}`)), 'No items');
  let stats=(jobs.agent_stats||[]).length ? jobs.agent_stats : Object.entries(jobs.by_agent||{}).map(([agent,row])=>({agent,daily_avg:row.calls||0,weekly_avg:(row.calls||0)*7,monthly_avg:(row.calls||0)*30,calls_30d:row.calls||0,tokens_30d:row.tokens||0,cost_30d:row.cost_usd||0,top_model:''}));
  if(!stats.length)stats=(jobs.recent||[]).filter(j=>j.status==='done'||j.dispatch_count||((j.usage||{}).tokens||0)).map(j=>({agent:j.agent||j.name,daily_avg:j.dispatch_count||((j.usage||{}).calls||0)||1,weekly_avg:(j.dispatch_count||1)*7,monthly_avg:(j.dispatch_count||1)*30,calls_30d:j.dispatch_count||((j.usage||{}).calls||0)||1,tokens_30d:(j.usage||{}).tokens||0,cost_30d:(j.usage||{}).cost_usd||0,top_model:Object.keys(((j.usage||{}).models)||{})[0]||''}));
  table($('agentStats'), ['agent','daily avg','weekly avg','monthly avg','30d calls','30d tokens','30d cost','model'], stats.map(a=>[a.agent,a.daily_avg,a.weekly_avg,a.monthly_avg,a.calls_30d,fmtTokens(a.tokens_30d),`$${Number(a.cost_30d||0).toFixed(4)}`,a.top_model]));
  clear($('service')).append(kv('heartbeat', `status=${hb.status||''} busy=${!!hb.busy} active=${hb.active_count||0}`), kv('web', `${data.service.web.host}:${data.service.web.port} https=${data.service.web.https}`), kv('control', Object.entries(data.service.control||{}).map(([name,value])=>`${name}: ${value}`).join(' · ')));
  clear($('security')).append(statusPill((data.security||{}).status||'gray',(data.security||{}).summary||'security'), ...((data.security||{}).checks||[]).map(c=>kv(c.name, `${c.status}: ${c.detail}`)), ...((data.security||{}).recommendations||[]).map(r=>kv('Fix', r)));
  forceDark();
}
window.onload=async()=>{forceDark(); buildNav(); $('refresh').onclick=loadDashboard; await loadProfiles(); await loadDashboard(); setInterval(loadDashboard,30000); setInterval(forceDark,1200)};
</script>
</body>
