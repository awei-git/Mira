# Mira Agent Configuration
# Copy this file to config.yml and fill in your values.
# config.yml is gitignored — your settings stay private.

# Root path — where Mira lives on your machine
root_path: "~/Mira"

# Apple Notes folder names (for inbox/outbox integration)
notes:
  inbox_folder: "Mira"
  briefing_folder: "Mira Briefings"
  output_folder: "Mira Results"

# Claude CLI binary path
claude_bin: "/opt/homebrew/bin/claude"

# Models — which LLM providers to use
models:
  writing: ["claude", "gpt5", "deepseek", "gemini"]
  review: ["claude", "gpt5", "gemini"]
  default: "claude"

# Substack (optional — needed for publish agent)
# substack:
#   subdomain: "your-blog"
#   cookie: "s%3A..."   # substack.sid cookie value

# Schedule
schedule:
  explore_times: ["09:00", "18:00"]
  explore_window_minutes: 30
  reflect_day: 6           # 0=Monday, 6=Sunday
  reflect_time: "10:00"
  journal_time: "23:00"

# Limits
limits:
  max_feed_items: 50
  max_briefing_items: 7
  max_deep_dives: 1
  max_memory_lines: 200
  task_timeout: 600        # seconds for short tasks (publish, general)
  task_timeout_long: 3600  # seconds for writing pipeline, deep research
  cleanup_days: 3          # auto-delete messages older than N days
