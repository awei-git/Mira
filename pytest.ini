[pytest]
markers =
    slow: tests that use real LLM calls (costs tokens)
    pipeline: end-to-end publish pipeline smoke tests
    runtime: tests that depend on local agent runtime state (data/, secrets.yml,
        config.yml, etc. — files that are .gitignored and absent on CI). These
        check side effects of the agent having run, not code behavior. CI runs
        with `-m "not slow and not runtime"`.
testpaths = tests
addopts = --import-mode=importlib
python_files = test_*.py
python_classes = Test*
python_functions = test_*
