name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Create minimal runtime dirs
        run: |
          mkdir -p /tmp/mira-test/threads
          mkdir -p /tmp/mira-test/users/ang/items

      - name: Run fast tests with coverage
        run: |
          python -m pytest tests/ -m "not slow" -x -q --tb=short \
            --cov=agents --cov=lib --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r agents/ lib/ web/ -f json -o bandit-report.json \
            --skip B101 -x "*/test_*,*/tests/*" || true
          bandit -r agents/ lib/ web/ --skip B101 -x "*/test_*,*/tests/*" -ll

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
