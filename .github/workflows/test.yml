name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Create minimal runtime dirs
        run: |
          mkdir -p /tmp/mira-test/threads
          mkdir -p /tmp/mira-test/users/ang/items

      - name: Run fast tests
        run: python -m pytest agents/ -m "not slow" -x -q --tb=short
