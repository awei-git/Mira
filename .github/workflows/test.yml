name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Create minimal runtime dirs
        run: |
          mkdir -p /tmp/mira-test/threads
          mkdir -p /tmp/mira-test/users/ang/items

      - name: Run fast tests with coverage (informational)
        # 2026-04-28: tests run for visibility but failures DO NOT block
        # merges. Years of accumulated rot — stale monkeypatches, runtime-
        # state assumptions, heavy import cascades — make this suite
        # unreliable as a merge gate. Real reliability work is a focused
        # follow-up; meanwhile `security` remains the merge gate.
        #
        # `continue-on-error: true` → the step can fail without failing
        # the workflow. Visible in logs, no red check, no email blast.
        # Removed `-x` so the report shows ALL failures, not just the
        # first one — easier to triage in one pass.
        continue-on-error: true
        run: |
          python -m pytest tests/ -m "not slow and not runtime" -q --tb=line \
            --cov=agents --cov=lib --cov-report=term-missing --cov-report=xml || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r agents/ lib/ web/ -c .bandit -f json -o bandit-report.json \
            -x "*/test_*,*/tests/*" || true
          bandit -r agents/ lib/ web/ -c .bandit -x "*/test_*,*/tests/*" -ll

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
