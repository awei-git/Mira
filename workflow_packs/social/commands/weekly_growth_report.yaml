    type: memory
  - name: aggregate_growth_signals
    type: deterministic
  - name: retention_ladder_report
    type: deterministic
    action: weekly_growth_report
  - name: action_quality_gate
    type: eval
  - name: experience_record_proposal_gateway
    type: memory
