<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Old status loop versus v3.1 evidence loop</title>
  <desc id="desc">A two-column diagram comparing a fragile status-only workflow with a v3.1 evidence workflow that records artifacts, verification, effect logs, and memory decisions.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8aa0b8"/>
    </marker>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b2432"/>
      <stop offset="100%" stop-color="#121821"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10251f"/>
      <stop offset="100%" stop-color="#0d1824"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#08111d"/>
  <text x="90" y="90" fill="#f4f2e8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="54" font-weight="820">From Status Theater To Evidence</text>
  <text x="92" y="138" fill="#aab4c3" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">The point of v3.1 is not more automation. It is making every important claim inspectable.</text>

  <rect x="90" y="205" width="660" height="585" rx="24" fill="url(#left)" stroke="#344155" stroke-width="3"/>
  <rect x="850" y="205" width="660" height="585" rx="24" fill="url(#right)" stroke="#2c735c" stroke-width="3"/>

  <text x="140" y="275" fill="#ffd7d7" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="800">Old loop</text>
  <text x="900" y="275" fill="#bff7df" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="800">v3.1 loop</text>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700">
    <rect x="165" y="335" width="210" height="70" rx="16" fill="#273247" stroke="#526079"/>
    <text x="230" y="380" fill="#eef4ff">Run</text>
    <line x1="375" y1="370" x2="485" y2="370" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="500" y="335" width="190" height="70" rx="16" fill="#263348" stroke="#526079"/>
    <text x="548" y="380" fill="#eef4ff">Status</text>

    <line x1="595" y1="405" x2="595" y2="505" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="470" y="525" width="250" height="78" rx="16" fill="#3a2630" stroke="#9b4a55"/>
    <text x="515" y="575" fill="#ffd7d7">Trust me</text>

    <rect x="920" y="330" width="190" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="975" y="373" fill="#e8fff5">Run</text>
    <line x1="1110" y1="363" x2="1190" y2="363" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="1210" y="330" width="230" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="1250" y="373" fill="#e8fff5">Artifact</text>

    <line x1="1325" y1="396" x2="1325" y2="460" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="1210" y="480" width="230" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="1245" y="523" fill="#e8fff5">Verifier</text>

    <line x1="1210" y1="513" x2="1110" y2="513" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="910" y="480" width="210" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="945" y="523" fill="#e8fff5">Effect log</text>

    <line x1="1015" y1="546" x2="1015" y2="610" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="900" y="630" width="250" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="928" y="673" fill="#e8fff5">Memory decision</text>

    <line x1="1150" y1="663" x2="1230" y2="663" stroke="#8aa0b8" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="1250" y="630" width="210" height="66" rx="15" fill="#143629" stroke="#43c99d"/>
    <text x="1293" y="673" fill="#e8fff5">Next run</text>
  </g>

  <text x="140" y="690" fill="#aab4c3" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23">A status label asks the user to believe the system.</text>
  <text x="900" y="755" fill="#aab4c3" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23">An evidence loop lets the user inspect, reject, and repair the claim.</text>
</svg>
