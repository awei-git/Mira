<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A Green Dot Is Not Evidence</title>
  <desc id="desc">A dark interface card with a green success dot separated from an evidence trail, illustrating that status without proof is not trust.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#201426"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132235"/>
      <stop offset="100%" stop-color="#0b1422"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="130" r="180" fill="#35d8a6" opacity="0.08"/>
  <circle cx="210" cy="760" r="250" fill="#ffb020" opacity="0.07"/>

  <text x="120" y="150" fill="#f7f3e8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="74" font-weight="800">A Green Dot Is Not Evidence</text>
  <text x="124" y="212" fill="#aab4c3" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28">The v3.1 lesson: status must be inspectable before it deserves trust.</text>

  <g filter="url(#shadow)">
    <rect x="150" y="310" width="560" height="350" rx="22" fill="url(#panel)" stroke="#2d405a" stroke-width="3"/>
    <text x="200" y="380" fill="#dce7f5" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="760">PIPELINE STATUS</text>
    <circle cx="220" cy="465" r="28" fill="#37e0ad"/>
    <text x="275" y="478" fill="#eef6ff" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="46" font-weight="800">Success</text>
    <text x="200" y="560" fill="#8fa0b6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26">artifact: unknown</text>
    <text x="200" y="604" fill="#8fa0b6" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26">model: unclear</text>
  </g>

  <path d="M760 485 C850 485 860 485 950 485" fill="none" stroke="#41536b" stroke-width="8" stroke-linecap="round"/>
  <path d="M930 455 L980 485 L930 515" fill="none" stroke="#41536b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="300" width="440" height="370" rx="22" fill="#0c1320" stroke="#f05252" stroke-width="3"/>
    <text x="1060" y="370" fill="#ffd4d4" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="760">EVIDENCE DRAWER</text>
    <line x1="1060" y1="430" x2="1390" y2="430" stroke="#3a4658" stroke-width="3"/>
    <text x="1060" y="488" fill="#ffb4b4" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">missing artifact</text>
    <text x="1060" y="548" fill="#ffb4b4" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">missing verifier</text>
    <text x="1060" y="608" fill="#ffb4b4" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">missing causal trace</text>
  </g>

  <text x="120" y="800" fill="#f7f3e8" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" font-weight="760">v3.1 turns every claim into a trail: run -> artifact -> verifier -> memory decision.</text>
</svg>
